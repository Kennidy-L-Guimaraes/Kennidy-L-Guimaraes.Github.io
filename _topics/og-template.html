<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --font: 'Cormorant Garamond', serif;
  --bg: #fff9e7;
  --fg: #2a1404;
  --accent: #9b511c;
}

html {
  width: 1200px;
  height: 630px;
}

body {
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  display: flex;
  align-items: center;
  padding: 80px;
  position: relative;
  overflow: hidden;
  
}

/* ÁGUIA (decorativa, sutil) */
body::after {
  content: "";
  position: absolute;
  right: -50px;
  bottom: -40px;
  width: 500px;
  height: 500px;
  background: url('/assets/img/harpia_1.1.webp') no-repeat center/contain;
  opacity: 0.1;
}

/* CONTEÚDO */
.content {
  max-width: 850px;
}

/* TAG */
.tag {
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--accent);
  opacity: 0.85;
  margin-bottom: 20px;
}

/* TÍTULO */
.title {
  font-size: 64px;
  line-height: 1.2;
  font-weight: 700;
  margin-bottom: 16px;

  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* SUBTÍTULO */
.subtitle {
  font-size: 26px;
  line-height: 1.4;
  opacity: 0.85;
  margin-bottom: 32px;

  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* FOOTER */
.footer {
  font-size: 20px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="content">
  <div class="tag" id="tag"></div>
  <h1 class="title" id="title"></h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="footer">
    Kennidy L. Guimarães · kennidylguimaraes.com
  </div>
</div>

<script>
const p = new URLSearchParams(window.location.search);

const tag = p.get('tag');
const title = p.get('title') || '';
const subtitle = p.get('subtitle');

if (tag) document.getElementById('tag').textContent = tag;
else document.getElementById('tag').remove();

document.getElementById('title').textContent = title;

if (subtitle) {
  document.getElementById('subtitle').textContent = subtitle;
} else {
  document.getElementById('subtitle').remove();
}
</script>

</body>
</html>
