<aside class="social-float" aria-label="Social links">

  {% if site.author.email %}
  <a class="social-float__link"
    href="mailto:{{ site.author.email }}"
    onclick="window.open('https://mail.google.com/mail/?view=cm&to={{ site.author.email }}','_blank')"
     title="Email"
     aria-label="Send email">
    <svg viewBox="0 0 24 24">
      <path d="M4 6h16v12H4z"/>
      <path d="M4 6l8 6 8-6"/>
    </svg>
  </a>
  {% endif %}

  {% if site.author.linkedin %}
  <a class="social-float__link"
     href="https://linkedin.com/in/{{ site.author.linkedin }}"
     target="_blank" rel="noopener noreferrer"
     title="LinkedIn"
     aria-label="LinkedIn">
    <svg viewBox="0 0 24 24">
      <rect x="4" y="4" width="16" height="16" rx="2"/>
      <line x1="8" y1="10" x2="8" y2="16"/>
      <line x1="8" y1="7" x2="8" y2="7"/>
      <line x1="12" y1="10" x2="12" y2="16"/>
      <path d="M12 13a3 3 0 0 1 6 0v3"/>
    </svg>
  </a>
  {% endif %}

  {% if site.author.twitter %}
  <a class="social-float__link"
     href="https://x.com/{{ site.author.twitter }}"
     target="_blank" rel="noopener noreferrer"
     title="X"
     aria-label="X">
    <svg viewBox="0 0 24 24">
      <path d="M6 6l12 12M18 6L6 18"/>
    </svg>
  </a>
  {% endif %}

  {% if site.author.whatsapp %}
  <a class="social-float__link"
     href="https://wa.me/{{ site.author.whatsapp }}"
     target="_blank"
     title="WhatsApp"
     aria-label="WhatsApp">
    <svg viewBox="0 0 24 24">
      <path d="M20 12a8 8 0 0 1-11.5 7l-4 1 1-4A8 8 0 1 1 20 12z"/>
      <path d="M9 10c1 2 3 3 5 4"/>
    </svg>
  </a>
  {% endif %}

  {% if site.author.github %}
  <a class="social-float__link"
     href="https://github.com/{{ site.author.github }}"
     target="_blank" rel="noopener noreferrer"
     title="GitHub"
     aria-label="GitHub">
    <svg viewBox="0 0 24 24">
      <path d="M12 2a10 10 0 0 0-3 19.5c.5.1.7-.2.7-.5v-2
               c-3 .7-3.6-1.4-3.6-1.4-.4-1-.9-1.3-.9-1.3
               -.7-.5 0-.5 0-.5.8.1 1.2.8 1.2.8.7 1.2
               1.8.9 2.2.7.1-.5.3-.9.5-1.1
               -2.4-.3-5-1.2-5-5.2 0-1.1.4-2
               1-2.7-.1-.3-.4-1.3.1-2.6 0 0
               .8-.3 2.8 1a9.7 9.7 0 0 1 5 0
               c2-1.3 2.8-1 2.8-1 .5 1.3.2 2.3.1 2.6
               .6.7 1 1.6 1 2.7 0 4-2.6 4.9-5 5.2
               .3.3.6.8.6 1.6v2.3c0 .3.2.6.7.5A10 10 0 0 0 12 2z"/>
    </svg>
  </a>
  {% endif %}

  <a class="social-float__link"
     href="{{ '/feed.xml' | relative_url }}"
     title="RSS"
     aria-label="RSS">
    <svg viewBox="0 0 24 24">
      <path d="M4 11a9 9 0 0 1 9 9"/>
      <path d="M4 4a16 16 0 0 1 16 16"/>
      <circle cx="5" cy="19" r="1"/>
    </svg>
  </a>

</aside>
