<script>
    function truncateWords(text, max = 26) {
        const words = text.replace(/\s+/g,' ').trim().split(' ');
        if (words.length <= max) return text;
        return words.slice(0, max).join(' ') + '…';
    }

    async function fetchMediumRSS() {
        const target = document.getElementById('medium-articles');
        const feedUrl = 'https://medium.com/feed/@{{ site.author.medium }}';
        try {
            const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(feedUrl));
            const xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
            const items = Array.from(xml.querySelectorAll('item')).slice(0, 5);
            if (!items.length) throw new Error('No items');
            target.innerHTML = items.map(el => {
                const title = el.querySelector('title')?.textContent ?? 'Untitled';
                const link = el.querySelector('link')?.textContent ?? '#';
                const pubDate = el.querySelector('pubDate') ? new Date(el.querySelector('pubDate').textContent).toLocaleDateString('en-US') : '';
                const contentNode = el.getElementsByTagName('content:encoded')[0] || el.querySelector('encoded, description');
                let snippet = '', image = '';
                if (contentNode) {
                    const temp = document.createElement('div');
                    temp.innerHTML = contentNode.textContent;
                    const p = temp.querySelector('p');
                    const img = temp.querySelector('img');
                    snippet = p ? `<p>${truncateWords(p.textContent, 36)}</p>` : '';
                    image = img ? `<img src="${img.src}" alt="${title}">` : '';
                }
                return `<li class="rss-item"><h4><a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a></h4><span class="rss-meta">Published in: ${pubDate}</span>${image}${snippet}</li>`;
            }).join('');
        } catch(e) {
            try {
                const res2 = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feedUrl));
                const data = await res2.json();
                if (!data.items?.length) throw new Error('No items');
                target.innerHTML = data.items.slice(0,5).map(item => {
                    const temp = document.createElement('div');
                    temp.innerHTML = item.content || item.description || '';
                    const p = temp.querySelector('p');
                    const img = temp.querySelector('img');
                    const pubDate = item.pubDate ? new Date(item.pubDate).toLocaleDateString('en-US') : '';
                    return `<li class="rss-item"><h4><a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a></h4><span class="rss-meta">Published in: ${pubDate}</span>${img ? `<img src="${img.src}" alt="${item.title}">` : ''}${p ? `<p>${truncateWords(p.textContent, 36)}</p>` : ''}</li>`;
                }).join('');
            } catch(err) {
                target.innerHTML = '<li class="rss-item"><p>We were unable to load the Medium articles at this time.</p></li>';
            }
        }
    }

    const GIT_ICON_SVG = `<svg class="repo-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M23.546 10.93L13.067.452c-.604-.603-1.582-.603-2.188 0L8.708 2.627l2.76 2.76c.645-.215 1.379-.07 1.889.441.516.515.658 1.258.438 1.9l2.658 2.66c.645-.223 1.387-.078 1.9.435.721.72.721 1.884 0 2.604-.719.719-1.881.719-2.6 0-.539-.541-.674-1.337-.404-1.996L12.86 8.955v6.525c.176.086.342.203.488.348.713.721.713 1.883 0 2.6-.719.721-1.889.721-2.609 0-.719-.719-.719-1.879 0-2.598.182-.18.387-.316.605-.406V8.835c-.217-.091-.424-.222-.6-.401-.545-.545-.676-1.342-.396-2.009L7.636 3.7.45 10.881c-.6.605-.6 1.584 0 2.189l10.48 10.477c.604.604 1.582.604 2.186 0l10.43-10.43c.605-.603.605-1.582 0-2.187"/>
    </svg>`;

    async function fetchGitHubRepos() {
        const target = document.getElementById('github-repos');
        try {
            const res = await fetch('https://api.github.com/users/{{ site.author.github }}/repos?sort=updated&per_page=6', { headers: { 'Accept': 'application/vnd.github+json' }});
            const repos = await res.json();
            if (!Array.isArray(repos) || !repos.length) throw new Error('No repositories');
            target.innerHTML = repos.map(r => `
                <a class="home-repo-item"
                   href="${r.html_url}"
                   target="_blank"
                   rel="noopener noreferrer">
                    <div class="repo-header">
                        <div class="repo-icons">${GIT_ICON_SVG}</div>
                        <h4>${r.name}</h4>
                    </div>
                    <span class="rss-meta">Updated on: ${new Date(r.updated_at).toLocaleDateString('en-US')}</span>
                    <p>${r.description ? truncateWords(r.description, 32) : 'Without description.'}</p>
                </a>`
            ).join('');
        } catch(e) {
            target.innerHTML = '<li class="home-repo-item"><p>The GitHub repositories could not be loaded.</p></li>';
        }
    }

    fetchMediumRSS();
    fetchGitHubRepos();
</script>
