---
layout: default
---

<div class="artigo-wrapper">

    <nav class="menu artigo-nav" aria-label="Back to home">
        <ul>
            <li><a href="{{ '/' | relative_url }}">← Home</a></li>
        </ul>
    </nav>

    <!-- ── Header: name + CV button ──────────────────────── -->
    <header class="artigo-header">
        <div class="artigo-header-barra" aria-hidden="true"></div>
        <div class="artigo-header-texto">
            <div class="about-header-top">
                <h1 class="artigo-titulo">{{ page.title }}</h1>
                <a
                    class="about-cv-btn"
                    href="{{ site.author.cv_url | default: '#' }}"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <i class="far fa-file-alt"></i> Curriculum Vitae
                </a>
            </div>
            <div class="artigo-meta">
                <span><i class="far fa-user"></i> {{ site.author.name }}</span>
                <span><i class="far fa-map-marker-alt"></i> {{ site.author.address }}</span>
            </div>
        </div>
    </header>

    <hr class="artigo-divider">

    <!-- ── GitHub Activity — top ──────────────────────────── -->
    <section class="about-activity">
        <div class="about-section-header">
            <span class="about-section-label">GitHub Activity</span>
            <span class="about-section-rule"></span>
        </div>

        <div class="about-commits-row">
            <div class="about-commits-block">
                <span class="about-commits-num" id="about-commits-num">—</span>
                <span class="about-commits-label">total commits</span>
            </div>
            <span class="about-commits-desc">
                Public contributions across all repositories on GitHub.
            </span>
        </div>

        <div class="about-graph">
            <img
                src="https://ghchart.rshah.org/8a7a67/{{ site.author.github }}"
                alt="GitHub contribution graph — {{ site.author.name }}"
                class="about-graph-img"
                loading="lazy"
            >
            <span class="about-graph-caption">GitHub contribution activity</span>
        </div>
    </section>

    <hr class="artigo-divider">

    <!-- ── Profile image ──────────────────────────────────── -->
    <div class="about-perfil">
        <img
            src="{{ site.author.avatar }}"
            alt="{{ site.author.name }}"
            class="about-perfil-img"
            loading="lazy"
        >
    </div>

    <!-- ── Bio content from about.md ─────────────────────── -->
    <div class="about-corpo">
        {{ content }}
    </div>

    <!-- ── Social links ───────────────────────────────────── -->
    <div class="about-social">
        <span class="about-social-label">Find me on</span>
        {% include social.html %}
    </div>

</div>

<script>
(function () {
    const el       = document.getElementById('about-commits-num');
    const username = '{{ site.author.github }}';

    async function fetchCommits() {
        try {
            const res   = await fetch(
                'https://api.github.com/users/' + username + '/repos?per_page=100',
                { headers: { 'Accept': 'application/vnd.github+json' } }
            );
            const repos = await res.json();
            if (!Array.isArray(repos)) throw new Error('No repos');

            const counts = await Promise.all(
                repos.map(function (r) {
                    return fetch(
                        'https://api.github.com/repos/' + username + '/' + r.name
                        + '/commits?per_page=1',
                        { headers: { 'Accept': 'application/vnd.github+json' } }
                    ).then(function (res) {
                        const link  = res.headers.get('Link') || '';
                        const match = link.match(/page=(\d+)>; rel="last"/);
                        return match ? parseInt(match[1], 10) : 1;
                    }).catch(function () { return 0; });
                })
            );

            const total = counts.reduce(function (a, b) { return a + b; }, 0);
            animateCount(total);
        } catch (e) {
            el.textContent = '—';
        }
    }

    function animateCount(target) {
        const duration = 1800;
        const start    = performance.now();
        function step(now) {
            const progress = Math.min((now - start) / duration, 1);
            const eased    = 1 - Math.pow(1 - progress, 3);
            el.textContent = Math.round(eased * target).toLocaleString();
            if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    const observer = new IntersectionObserver(function (entries) {
        if (entries[0].isIntersecting) {
            fetchCommits();
            observer.disconnect();
        }
    }, { threshold: 0.3 });

    if (el) observer.observe(el);
})();
</script>
